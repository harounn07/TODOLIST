name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Build Docker image
        run: docker build -t todo-app .

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'todo-app'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          skip-dirs: '/usr/local/lib/node_modules/npm'

      - name: Notify Discord - Success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "✅ Deployment Succeeded",
              "description": "**Repo:** ${{ github.repository }}\n**Branch:** ${{ github.ref_name }}\n**Commit:** ${{ github.event.head_commit.message }}\n**By:** ${{ github.actor }}",
              "color": 3066993,
              "footer": { "text": "GitHub Actions" },
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }]
          }' \
          $DISCORD_WEBHOOK

      - name: Notify Discord - Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "❌ Deployment Failed",
              "description": "**Repo:** ${{ github.repository }}\n**Branch:** ${{ github.ref_name }}\n**Commit:** ${{ github.event.head_commit.message }}\n**By:** ${{ github.actor }}\n[View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
              "color": 15158332,
              "footer": { "text": "GitHub Actions" },
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }]
          }' \
          $DISCORD_WEBHOOK