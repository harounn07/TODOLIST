<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ToDo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <div class="header-icon">✦</div>
      <h1>My Tasks</h1>
      <p class="subtitle">Stay focused, get it done.</p>
    </header>

    <div class="input-row">
      <input id="task" type="text" placeholder="Add a new task..." autocomplete="off" />
      <button onclick="addTask()">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
      <button class="filter-btn" onclick="filterTasks('active', this)">Active</button>
      <button class="filter-btn" onclick="filterTasks('done', this)">Done</button>
    </div>

    <ul id="list"></ul>

    <div class="footer">
      <span id="count">0 tasks remaining</span>
      <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
